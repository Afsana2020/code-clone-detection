<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Clone Detector</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', monospace;
            background: #f3f3f3;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            padding: 0.75rem;
        }
        .container {
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            background: #ffffff;
            border: 1px solid #c9c9c9;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.05);
            height: 98vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .title-panel {
            background: #f3f3f3;
            border-bottom: 1px solid #c9c9c9;
            padding: 1rem 2rem 0.9rem 2rem;
            text-align: center;
            flex-shrink: 0;
        }
        h1 {
            color: #007acc;
            font-size: 1.9rem;
            font-weight: 500;
            letter-spacing: -0.3px;
            margin-bottom: 0.1rem;
            text-transform: uppercase;
            line-height: 1.2;
        }
        .subtitle {
            color: #4d4d4d;
            font-size: 0.7rem;
            font-weight: 400;
            letter-spacing: 0.3px;
        }
        .heading-wrapper {
            text-align: center;
            margin: 0.2rem 2rem 0.2rem 2rem;
            flex-shrink: 0;
        }
        .section-heading {
            font-size: 0.8rem;
            font-weight: 600;
            color: #007acc;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-bottom: 2px solid #007acc;
            padding-bottom: 0.2rem;
            display: inline-block;
        }
        .input-section {
            display: flex;
            gap: 1.5rem;
            margin: 0.5rem 2rem 0.5rem 2rem;
            flex: 1;
            min-height: 0;
        }
        .code-box {
            flex: 1;
            background: #ffffff;
            border: 1px solid #d4d4d4;
            transition: border 0.1s;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .code-box:hover {
            border-color: #007acc;
        }
        .code-box h3 {
            margin: 0;
            padding: 0.4rem 1rem;
            background: #f3f3f3;
            color: #007acc;
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-bottom: 1px solid #d4d4d4;
            flex-shrink: 0;
        }
        textarea {
            width: 100%;
            flex: 1;
            padding: 0.8rem 1rem;
            font-family: 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            font-size: 0.8rem;
            line-height: 1.4;
            border: none;
            background: #ffffff;
            resize: none;
            color: #1e1e1e;
            min-height: 0;
            overflow-y: auto;
        }
        textarea:focus {
            outline: none;
            background: #fcfcfc;
        }
        .button-container {
            margin: 0.5rem 2rem 0.5rem 2rem;
            text-align: center;
            flex-shrink: 0;
        }
        .analyze-btn {
            background: transparent;
            color: #007acc;
            border: 2px solid #007acc;
            padding: 0.5rem 2.8rem;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            cursor: pointer;
            transition: 0.1s ease;
        }
        .analyze-btn:hover {
            background: #007acc;
            color: white;
        }
        .analyze-btn:disabled {
            border-color: #aaa;
            color: #aaa;
            background: white;
            cursor: not-allowed;
        }
        .loading {
            display: none;
            text-align: center;
            margin: 0.2rem 2rem;
            flex-shrink: 0;
        }
        .spinner {
            border: 2px solid #e0e0e0;
            border-top-color: #007acc;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.9s linear infinite;
            margin: 0 auto 0.2rem auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading p {
            color: #007acc;
            font-size: 0.7rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .results-section {
            margin: 0.5rem 2rem 0.8rem 2rem;
            background: #fafafa;
            padding: 1.5rem;
            border: 2px solid;
            transition: border-color 0.2s;
            flex-shrink: 0;
            text-align: center;
        }
        .result-label {
            font-size: 0.8rem;
            color: #007acc;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }
        .result-text {
            font-size: 2rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .error {
            background: #ffffff;
            border-left: 5px solid #a1260d;
            border-top: 1px solid #f3d9d9;
            border-right: 1px solid #f3d9d9;
            border-bottom: 1px solid #f3d9d9;
            color: #a1260d;
            padding: 0.6rem 1.5rem;
            margin: 0.3rem 2rem;
            text-align: center;
            font-size: 0.8rem;
            font-weight: 500;
            flex-shrink: 0;
        }
        footer {
            margin: 0 2rem 0.5rem 2rem;
            padding: 0.6rem 0 0.3rem 0;
            text-align: center;
            border-top: 1px solid #d4d4d4;
            color: #2d2d2d;
            font-size: 0.65rem;
            flex-shrink: 0;
        }
        .footer-main {
            font-weight: 400;
            letter-spacing: 0.3px;
            margin-bottom: 0.2rem;
        }
        .footer-main .ah {
            font-weight: 600;
            color: #007acc;
        }
        .footer-credit {
            font-size: 0.65rem;
            color: #4d4d4d;
            margin-bottom: 0.1rem;
        }
        .footer-credit a {
            color: #007acc;
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px dotted #007acc;
        }
        .footer-credit a:hover {
            border-bottom: 1px solid #007acc;
        }
        @media (max-height: 700px) {
            h1 { font-size: 1.6rem; }
            .code-box h3 { padding: 0.2rem 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">

        <div class="title-panel">
            <h1>CODE CLONE DETECTOR</h1>
            <div class="subtitle">
                SEMANTIC SIMILARITY ANALYSIS
            </div>
        </div>

        <div class="heading-wrapper">
            <span class="section-heading">SOURCE SAMPLES</span>
        </div>

        <div class="input-section">
            <div class="code-box">
                <h3>SAMPLE A</h3>
                <textarea id="codeA" placeholder="# Paste source code here..."></textarea>
            </div>
            <div class="code-box">
                <h3>SAMPLE B</h3>
                <textarea id="codeB" placeholder="# Paste source code here..."></textarea>
            </div>
        </div>

        <div class="button-container">
            <button class="analyze-btn" onclick="compare()" id="compareBtn">
                ANALYZE SIMILARITY
            </button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>PROCESSING</p>
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <div id="results" class="results-section" style="display: none;">
            <div class="result-label">RESULT</div>
            <div class="result-text" id="resultText">—</div>
        </div>

        <footer>
            <div class="footer-main">
                <span class="ah">A.H.</span> © 2026 · ALL RIGHTS RESERVED
            </div>
            <div class="footer-credit">
                Developed by <a href="https://www.linkedin.com/in/afsana-hena/" target="_blank">Afsana Hena</a>
            </div>
        </footer>
    </div>

    <script>
        async function compare() {
            const codeA = document.getElementById('codeA').value.trim();
            const codeB = document.getElementById('codeB').value.trim();
            if (!codeA || !codeB) {
                showError('Please provide both code samples');
                return;
            }
            document.getElementById('compareBtn').disabled = true;
            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').style.display = 'none';
            document.getElementById('error').style.display = 'none';
            try {
                const response = await fetch('/compare', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        code_a: codeA,
                        code_b: codeB
                    })
                });
                const data = await response.json();
                if (data.error) {
                    showError(data.error);
                    return;
                }
                displayResults(data);
            } catch (err) {
                showError('Server connection failed');
                console.error(err);
            } finally {
                document.getElementById('compareBtn').disabled = false;
                document.getElementById('loading').style.display = 'none';
            }
        }
        function displayResults(data) {
            const resultsSection = document.getElementById('results');
            const resultText = document.getElementById('resultText');
            if (data.is_clone) {
                resultsSection.style.borderColor = '#dc3545';
                resultText.textContent = 'CLONE';
                resultText.style.color = '#dc3545';
            } else {
                resultsSection.style.borderColor = '#28a745';
                resultText.textContent = 'NOT A CLONE';
                resultText.style.color = '#28a745';
            }
            document.getElementById('results').style.display = 'block';
        }
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = 'ERROR: ' + message;
            errorDiv.style.display = 'block';
        }
    </script>
</body>
</html>
